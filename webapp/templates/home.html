{% extends "base.html" %}
{% block content %}
<div class="chat-layout" id="guestRoot">
  <aside class="sidebar">
    <div class="sidebar-head">
      <div style="font-weight:900;">Guest mode</div>
      <div class="small-note">No history</div>
    </div>

    <div class="chat-list">
      <div class="chat-item" style="cursor:default;">
        <div class="t">Use without account</div>
        <div class="s">Your messages won’t be saved. Refreshing clears the chat.</div>
      </div>
    </div>
  </aside>

  <section class="chat-main">
    <div class="chat-main-head">
      <div>
        <div style="font-weight:900;">CIS RAG Chat</div>
        <div class="small-note">Guest mode — login to save chat history.</div>
      </div>
      <div style="display:flex; gap:10px;">
        <button class="btn" id="guestResetBtn" type="button">Reset</button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="msg assistant">
        Hi 👋 Ask me anything about the Faculty of Computer & Information Science (CS + IS).
      </div>
    </div>

    <div class="chat-input">
      <textarea id="guestQ" dir="auto" placeholder="Type your question... (Hebrew/English)"></textarea>
      <button class="btn primary" id="guestSendBtn" type="button">Send</button>
    </div>
  </section>
</div>
{% endblock %}
